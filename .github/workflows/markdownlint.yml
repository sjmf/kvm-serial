name: Lint Markdown

on:
  push:
    paths:
      - "**/*.md"
      - ".pymarkdown.json"
  pull_request:
    paths:
      - "**/*.md"
      - ".pymarkdown.json"

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pymarkdown
        run: pip install pymarkdownlnt==0.9.37

      - name: Lint Markdown
        run: pymarkdown scan --recurse .
